# Configuración del servicio para la base de datos PostgreSQL del sistema bancario.
apiVersion: v1
kind: Service

# Metadatos del Service.
metadata:
  name: postgres-bank

# Especificación del Service, define el selector de etiquetas, los puertos expuestos y el tipo de Service.
spec:
  selector:
    app: postgres-bank
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
