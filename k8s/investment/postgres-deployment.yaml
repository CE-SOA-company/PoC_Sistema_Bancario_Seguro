apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-investment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-investment
  template:
    metadata:
      labels:
        app: postgres-investment
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: investment_db
            - name: POSTGRES_USER
              value: investment_user
            - name: POSTGRES_PASSWORD
              value: investment_pass
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-investment-pvc
