# Configuración del Deployment de Kubernetes para la base de datos PostgreSQL del servicio IAM.
apiVersion: apps/v1
kind: Deployment

# Metadatos del Deployment, incluyendo su nombre.
metadata:
  name: postgres-iam

# Especificación del Deployment, define el número de réplicas, el selector de etiquetas y la plantilla del pod.
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-iam
  template:
    metadata:
      labels:
        app: postgres-iam
    
    # Especificación del contenedor que se ejecutará en el pod, incluyendo su nombre, imagen, puertos y variables de entorno.
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: iam_db
            - name: POSTGRES_USER
              value: iam_user
            - name: POSTGRES_PASSWORD
              value: iam_pass
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      
      # Definición del volumen persistente para almacenar los datos de PostgreSQL.
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-iam-pvc
