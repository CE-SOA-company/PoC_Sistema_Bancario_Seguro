apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-iam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-iam
  template:
    metadata:
      labels:
        app: postgres-iam
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: iam_db
            - name: POSTGRES_USER
              value: iam_user
            - name: POSTGRES_PASSWORD
              value: iam_pass
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-iam-pvc
